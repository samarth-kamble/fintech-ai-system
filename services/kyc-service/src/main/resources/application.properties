spring.application.name=kyc-service
server.port=8082

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/fintech-ai-system
spring.datasource.username=root
spring.datasource.password=Samarthk@91
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Disable PgVector Auto-configuration if EmbeddingModel is not configured
spring.autoconfigure.exclude=org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration

